<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#060911">
<title>Z</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=DM+Mono:wght@300;400&display=swap');
  :root{
    --void:#060911; --ink:#EAF0FF; --ink-dim:rgba(234,240,255,.5);
    --ink-faint:rgba(234,240,255,.22); --volt:#3D7BFF; --volt-bright:#6AA4FF;
    --line:rgba(106,164,255,.14);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--void);color:var(--ink);
    font-family:'Fraunces',Georgia,serif;-webkit-font-smoothing:antialiased}
  #field{position:fixed;inset:0;z-index:1}
  #grain{position:fixed;inset:0;z-index:2;opacity:.035;pointer-events:none;mix-blend-mode:screen}
  .screen{position:fixed;inset:0;z-index:10;display:none;flex-direction:column}
  .screen.on{display:flex}
  .mono{font-family:'DM Mono',monospace;letter-spacing:2px;text-transform:uppercase}

  /* ── onboarding ── */
  #onboard{justify-content:center;align-items:center;padding:32px;text-align:center}
  #onboard .big{font-size:26px;font-weight:300;line-height:1.3;margin-bottom:6px}
  #onboard .sub{font-size:10px;color:var(--ink-faint);margin-bottom:36px}
  .field{width:100%;max-width:300px;margin:0 auto 12px}
  .field input{width:100%;background:rgba(255,255,255,.02);border:1px solid var(--line);
    border-radius:12px;padding:13px 16px;color:var(--ink);font-family:'Fraunces',serif;
    font-size:15px;outline:none;text-align:center}
  .field input::placeholder{color:var(--ink-faint)}
  .btn{display:inline-block;margin-top:12px;background:rgba(61,123,255,.12);
    border:1px solid rgba(106,164,255,.3);color:var(--volt-bright);border-radius:12px;
    padding:12px 34px;font-family:'Fraunces',serif;font-size:15px;cursor:pointer;transition:.2s}
  .btn:active{background:var(--volt);color:#fff;transform:scale(.97)}

  /* ── roster (pick companions) — contacts/phonebook feel ── */
  #roster{padding:24px 18px 0}
  #roster h2{font-size:19px;font-weight:300;margin-bottom:3px}
  #roster .hint{font-size:9px;color:var(--ink-faint);margin-bottom:18px}
  #ptiles{overflow-y:auto;flex:1;margin:0 -2px;padding:0 2px}
  #ptiles::-webkit-scrollbar{display:none}
  .ptile{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid transparent;
    border-bottom:1px solid var(--line);cursor:pointer;transition:.15s}
  .ptile:active{background:rgba(106,164,255,.05)}
  .ptile .face{width:36px;height:36px;border-radius:11px;flex-shrink:0;display:grid;place-items:center;
    font-size:15px;color:#fff;background:radial-gradient(circle at 35% 30%, var(--c1), var(--c2))}
  .ptile .pmeta{flex:1;min-width:0}
  .ptile .pn{font-size:15px;line-height:1.2}
  .ptile .pd{font-size:10px;color:var(--ink-faint);margin-top:1px}
  .ptile .add{color:var(--ink-faint);font-size:17px;width:24px;text-align:center}
  .ptile.added{border-radius:11px;border-color:rgba(106,164,255,.35);background:rgba(61,123,255,.06)}
  .ptile.added .add{color:var(--volt-bright)}
  .ptile.added .pn{color:var(--volt-bright)}
  #roster .go{padding:14px 0 calc(18px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent,var(--void) 35%)}

  /* ── chat (B Field) ── */
  #chat{}
  .peek{padding:14px 18px 0;display:flex;align-items:center;justify-content:space-between;z-index:30}
  .who{display:flex;align-items:center;gap:9px;cursor:pointer}
  .who .nm{font-size:16px}
  .who .rl{font-size:9px;color:var(--ink-faint);margin-top:2px}
  .chev{font-family:'DM Mono',monospace;color:var(--ink-faint);font-size:11px;transition:transform .35s}
  .peek.open .chev{transform:rotate(180deg)}
  .clear{font-size:9px;color:var(--ink-faint);cursor:pointer}
  .drawer{position:absolute;top:52px;left:14px;right:14px;z-index:29;background:rgba(8,13,26,.9);
    backdrop-filter:blur(20px);border:1px solid var(--line);border-radius:16px;padding:6px;
    opacity:0;transform:translateY(-10px);pointer-events:none;transition:.28s;max-height:60vh;overflow-y:auto}
  .drawer.open{opacity:1;transform:none;pointer-events:auto}
  .drow{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:11px;cursor:pointer}
  .drow:active{background:rgba(106,164,255,.07)}
  .drow .face{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;font-size:12px;color:#fff;
    background:radial-gradient(circle at 35% 30%, var(--c1), var(--c2))}
  .drow .dn{font-size:14px}
  .drow .add{margin-left:auto;color:var(--ink-faint);font-size:10px}
  .convo{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:0 22px;overflow-y:auto;z-index:20}
  .convo::-webkit-scrollbar{display:none}
  .mz{font-size:17px;line-height:1.55;font-weight:300;max-width:88%;margin-top:18px;
    opacity:0;transform:translateY(8px);transition:opacity 1s,transform 1s;text-shadow:0 2px 30px rgba(0,0,0,.6)}
  .mz.show{opacity:1;transform:none}
  .my{align-self:flex-end;margin-top:18px;font-size:14px;font-style:italic;color:var(--ink-dim);
    background:rgba(61,123,255,.1);border:1px solid var(--line);padding:9px 14px;
    border-radius:14px 14px 4px 14px;max-width:76%}
  .cursor{display:inline-block;width:2px;height:.85em;background:var(--volt-bright);margin-left:3px;
    vertical-align:text-bottom;animation:blink 1.1s steps(1) infinite;box-shadow:0 0 10px var(--volt)}
  @keyframes blink{50%{opacity:0}}
  .dock{position:relative;padding:18px 20px calc(18px + env(safe-area-inset-bottom));display:flex;
    align-items:center;gap:12px;z-index:25}
  .dock::before{content:"";position:absolute;left:20px;right:20px;top:0;height:1px;
    background:linear-gradient(90deg,transparent,rgba(106,164,255,.25),transparent)}
  .dock input{flex:1;background:none;border:none;outline:none;color:var(--ink);
    font-family:'Fraunces',serif;font-size:14px;font-style:italic}
  .dock input::placeholder{color:var(--ink-faint)}
  .send{width:42px;height:42px;border-radius:50%;border:1px solid rgba(106,164,255,.3);
    background:rgba(61,123,255,.12);color:var(--volt-bright);display:grid;place-items:center;
    cursor:pointer;font-size:17px;transition:.2s;flex-shrink:0}
  .send:active{background:var(--volt);color:#fff;transform:scale(.94)}
</style>
</head>
<body>
<canvas id="field"></canvas><canvas id="grain"></canvas>

<!-- ONBOARDING -->
<div class="screen on" id="onboard">
  <div class="big">Hey.</div>
  <div class="sub mono">a diary that talks back</div>
  <div class="field"><input id="ob-name" placeholder="what should I call you?" autocomplete="off"></div>
  <div class="field"><input id="ob-region" placeholder="where are you from?" autocomplete="off"></div>
  <div class="btn" id="ob-go">begin</div>
</div>

<!-- ROSTER -->
<div class="screen" id="roster">
  <h2>Who do you need?</h2>
  <div class="hint mono">pick your people · tap to add · you can rename them</div>
  <div id="ptiles"></div>
  <div class="go"><div class="btn" id="rs-go" style="width:100%;text-align:center">enter</div></div>
</div>

<!-- CHAT -->
<div class="screen" id="chat">
  <div class="peek" id="peek">
    <div class="who" id="who">
      <div><div class="nm" id="curName">—</div><div class="rl mono" id="curRole">—</div></div>
      <span class="chev">▾</span>
    </div>
    <span class="clear mono" id="clearBtn">clear</span>
  </div>
  <div class="drawer" id="drawer"></div>
  <div class="convo" id="convo"></div>
  <div class="dock">
    <input id="inp" placeholder="…" autocomplete="off">
    <div class="send" id="send">→</div>
  </div>
</div>

<script>
// ════ config ════
const API = location.origin;                  // engine serves this page → same origin
let UID = localStorage.getItem('z_uid');
if(!UID){ UID = 'u'+Math.random().toString(36).slice(2)+Date.now().toString(36); localStorage.setItem('z_uid',UID); }
const HDRS = () => ({ 'Content-Type':'application/json', 'x-z-user': UID });

// ════ persona catalogue (mirrors engine personas.ts) ════
const CATALOG = [
  { key:'mr_anxiety',     name:'Mr. Anxiety',         role:'the heavy days',       c1:'#3D7BFF', c2:'#16306b' },
  { key:'love_sucks',     name:'Love Sucks',          role:'heartbreak',           c1:'#5B6BFF', c2:'#2a1b6b' },
  { key:'the_close_cousin', name:'The Close Cousin',  role:'family & marriage',    c1:'#6AA4FF', c2:'#1b3a6b' },
  { key:'workplace_shit', name:'Workplace Shit',      role:'the grind',            c1:'#4Fb3FF', c2:'#15406b' },
  { key:'devils_advocate',name:"The Devil's Advocate",role:'debate me',            c1:'#7FB2FF', c2:'#1b2c6b' },
  { key:'the_wingman',    name:'The Wingman',         role:'dating',               c1:'#5Bd0FF', c2:'#155a6b' },
  { key:'the_flame',      name:'The Flame',           role:'feel wanted',          c1:'#9C6AFF', c2:'#3a1b6b' },
  { key:'detox_doc',      name:'Detox Doc',           role:'the climb',            c1:'#4FFFC4', c2:'#155a4b' },
  { key:'mr_confident',   name:'Mr. Confident',       role:'become',               c1:'#6AA4FF', c2:'#1b3a6b' },
  { key:'almost_hot',     name:'Almost Hot',          role:'skin you\'re in',      c1:'#FF8Fb2', c2:'#6b1b3a' },
];
// engine persona_key map (catalogue keys → engine keys)
const KEYMAP = { mr_anxiety:'mr_anxiety', love_sucks:'love_sucks', the_close_cousin:'close_cousin',
  workplace_shit:'workplace_shit', devils_advocate:'devils_advocate', the_wingman:'wingman',
  the_flame:'flame', detox_doc:'detox_doc', mr_confident:'mr_confident', almost_hot:'almost_hot' };

let chosen = [];        // catalogue entries the user picked
let threads = [];       // created thread rows from engine
let active = null;      // active thread

// ════ field animation ════
const cv=document.getElementById('field'),ctx=cv.getContext('2d');
let W,H,DPR;function rs(){DPR=Math.min(devicePixelRatio||1,1.6);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';}
rs();addEventListener('resize',rs);
let turb=0.16,tTurb=0.16,hue={r:61,g:123,b:255},hT={r:61,g:123,b:255};
const lp=(a,b,k)=>a+(b-a)*k;
const blobs=[];for(let i=0;i<6;i++)blobs.push({x:Math.random(),y:Math.random(),vx:Math.random()-.5,vy:Math.random()-.5,r:0.25+Math.random()*0.3,ph:Math.random()*6.28});
let tt=0;
function draw(){tt+=0.016;turb=lp(turb,tTurb,0.02);hue.r=lp(hue.r,hT.r,0.04);hue.g=lp(hue.g,hT.g,0.04);hue.b=lp(hue.b,hT.b,0.04);
  const A=`${hue.r|0},${hue.g|0},${hue.b|0}`;ctx.globalCompositeOperation='source-over';ctx.fillStyle='#060911';ctx.fillRect(0,0,W,H);ctx.globalCompositeOperation='lighter';
  for(const b of blobs){const dr=0.0006*(0.3+turb*2.2);b.x+=b.vx*dr+Math.sin(tt*0.5+b.ph)*0.0008*turb;b.y+=b.vy*dr+Math.cos(tt*0.4+b.ph)*0.0008*turb;
    if(b.x<-.3)b.x=1.3;if(b.x>1.3)b.x=-.3;if(b.y<-.3)b.y=1.3;if(b.y>1.3)b.y=-.3;
    const pu=1+Math.sin(tt*(0.6+turb)+b.ph)*0.18*(0.4+turb);const R=b.r*Math.min(W,H)*pu*(0.9+turb*0.5);const x=b.x*W,y=b.y*H;
    const g=ctx.createRadialGradient(x,y,0,x,y,R);const pk=0.10+turb*0.16;g.addColorStop(0,`rgba(${A},${pk})`);g.addColorStop(0.5,`rgba(${A},${pk*0.35})`);g.addColorStop(1,'rgba(6,9,17,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,R,0,6.2832);ctx.fill();}
  requestAnimationFrame(draw);}
draw();
const gc=document.getElementById('grain'),gx=gc.getContext('2d');
function grain(){gc.width=innerWidth;gc.height=innerHeight;const d=gx.createImageData(gc.width,gc.height);for(let i=0;i<d.data.length;i+=4){const v=Math.random()*255;d.data[i]=d.data[i+1]=d.data[i+2]=v;d.data[i+3]=255;}gx.putImageData(d,0,0);}
grain();setInterval(grain,100);addEventListener('resize',grain);
function setHue(c1){const m=c1.match(/\w\w/g).map(h=>parseInt(h,16));hT={r:m[0],g:m[1],b:m[2]};}

// ════ screens ════
const show=id=>{document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');};

// onboarding
document.getElementById('ob-go').onclick=()=>{
  const name=document.getElementById('ob-name').value.trim();
  const region=document.getElementById('ob-region').value.trim();
  if(name) localStorage.setItem('z_name',name);
  if(region) localStorage.setItem('z_region',region);
  buildRoster(); show('roster');
};

// roster build
function buildRoster(){
  const wrap=document.getElementById('ptiles'); wrap.innerHTML='';
  CATALOG.forEach(p=>{
    const el=document.createElement('div'); el.className='ptile'; el.dataset.key=p.key;
    el.style.cssText=`--c1:${p.c1};--c2:${p.c2}`;
    el.innerHTML=`<div class="face">${p.name[0]}</div><div class="pmeta"><div class="pn">${p.name}</div><div class="pd mono">${p.role}</div></div><div class="add">+</div>`;
    el.onclick=()=>{ const i=chosen.findIndex(c=>c.key===p.key);
      if(i>=0){chosen.splice(i,1);el.classList.remove('added');el.querySelector('.add').textContent='+';}
      else{chosen.push(p);el.classList.add('added');el.querySelector('.add').textContent='✓';} };
    wrap.appendChild(el);
  });
}
document.getElementById('rs-go').onclick=async()=>{
  if(chosen.length===0){ chosen.push(CATALOG[0]); }   // default to Mr. Anxiety if none picked
  // create a thread per chosen persona
  threads=[];
  for(const p of chosen){
    try{
      const r=await fetch(API+'/threads',{method:'POST',headers:HDRS(),body:JSON.stringify({
        personaKey:KEYMAP[p.key], name:p.name, accent:p.c1 })});
      const t=await r.json(); if(t&&t.id){ threads.push({...t, cat:p}); }
    }catch(e){ console.error('thread create failed',e); }
  }
  if(threads.length===0){ alert('could not reach Z. is the engine up?'); return; }
  active=threads[0]; renderDrawer(); openThread(active); show('chat');
  greet();
};

// ════ chat ════
const convo=document.getElementById('convo'),inp=document.getElementById('inp');
const peek=document.getElementById('peek'),drawer=document.getElementById('drawer');
document.getElementById('who').onclick=()=>{peek.classList.toggle('open');drawer.classList.toggle('open');};
document.getElementById('clearBtn').onclick=()=>{convo.innerHTML='';greet();};

function renderDrawer(){
  drawer.innerHTML='';
  threads.forEach(t=>{
    const row=document.createElement('div'); row.className='drow'; row.style.cssText=`--c1:${t.cat.c1};--c2:${t.cat.c2}`;
    row.innerHTML=`<div class="face">${t.companion_name[0]}</div><div class="dn">${t.companion_name}</div><div class="add mono">${t.cat.role}</div>`;
    row.onclick=()=>{ active=t; openThread(t); peek.classList.remove('open'); drawer.classList.remove('open'); convo.innerHTML=''; greet(); };
    drawer.appendChild(row);
  });
}
function openThread(t){
  document.getElementById('curName').textContent=t.companion_name;
  document.getElementById('curRole').textContent=t.cat.role;
  inp.placeholder='tell '+t.companion_name+'…';
  setHue(t.cat.c1);
}
function greet(){ typeZ("Hey. What's on your mind?"); }

function youSay(t){const e=document.createElement('div');e.className='my';e.textContent=t;convo.appendChild(e);convo.scrollTop=convo.scrollHeight;}
function typeZ(text){
  const el=document.createElement('div'); el.className='mz'; convo.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  let i=0;const cur='<span class="cursor"></span>';
  (function tick(){el.innerHTML=text.slice(0,i)+cur;i++;convo.scrollTop=convo.scrollHeight;
    if(i<=text.length)setTimeout(tick,24);else el.innerHTML=text;})();
}

async function send(){
  const v=inp.value.trim(); if(!v||!active) return; inp.value='';
  youSay(v); tTurb=0.7;
  // streaming via fetch + SSE parse
  const el=document.createElement('div'); el.className='mz'; convo.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  let acc=''; const cur='<span class="cursor"></span>'; el.innerHTML=cur;
  try{
    const resp=await fetch(API+'/chat',{method:'POST',headers:HDRS(),body:JSON.stringify({threadId:active.id,message:v})});
    const reader=resp.body.getReader(); const dec=new TextDecoder(); let buf='';
    while(true){
      const {done,value}=await reader.read(); if(done)break;
      buf+=dec.decode(value,{stream:true});
      const parts=buf.split('\n\n'); buf=parts.pop();
      for(const p of parts){ const line=p.replace(/^data: /,'').trim(); if(!line)continue;
        try{ const j=JSON.parse(line);
          if(j.token){ acc+=j.token; el.innerHTML=acc+cur; convo.scrollTop=convo.scrollHeight; }
          if(j.done){ el.innerHTML=acc; tTurb=0.16; }
          if(j.error){ el.innerHTML=acc+' …(error: '+j.error+')'; tTurb=0.16; }
        }catch(_){}
      }
    }
    el.innerHTML=acc||'…';
  }catch(e){ el.innerHTML='…(couldn\'t reach Z)'; tTurb=0.16; }
}
document.getElementById('send').onclick=send;
inp.addEventListener('keydown',e=>{if(e.key==='Enter')send();});

// prefill name if returning
if(localStorage.getItem('z_name')) document.getElementById('ob-name').value=localStorage.getItem('z_name');
if(localStorage.getItem('z_region')) document.getElementById('ob-region').value=localStorage.getItem('z_region');
</script>
</body>
</html>
